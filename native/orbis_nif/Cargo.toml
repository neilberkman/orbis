[package]
name = "orbis_nif"
version = "0.1.0"
authors = []
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37.3"
chrono = "0.4"
# Pinned to a published commit of the astrodynamics repo so CI and external
# builds resolve without a local sibling checkout. Bump the rev when the crate
# advances; switch to crates.io versions at the v1 release. For local
# development against the workspace, an uncommitted native/orbis_nif/.cargo/
# config.toml overrides these with the local paths (see config.toml.example).
astrodynamics = { git = "https://github.com/neilberkman/astrodynamics.git", rev = "2805431a63f51b2e72d5c05e299f2bcab7ad1c69" }
astrodynamics-gnss = { git = "https://github.com/neilberkman/astrodynamics.git", rev = "2805431a63f51b2e72d5c05e299f2bcab7ad1c69" }
