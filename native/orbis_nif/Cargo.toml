[package]
name = "orbis_nif"
version = "0.1.0"
authors = []
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37.3"
chrono = "0.4"
# Tracks the astrodynamics repository between crates.io releases (the published
# 0.7.0 crates predate the APIs these NIFs call); the next coordinated release
# pins published versions again. For local development against the workspace, an
# uncommitted native/orbis_nif/.cargo/config.toml overrides these with the local
# paths (see config.toml.example).
astrodynamics = { git = "https://github.com/neilberkman/astrodynamics", rev = "80728790a7b4c2693c5e7c1e53b592a66815cde2" }
astrodynamics-gnss = { git = "https://github.com/neilberkman/astrodynamics", rev = "80728790a7b4c2693c5e7c1e53b592a66815cde2" }
