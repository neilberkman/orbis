[package]
name = "orbis_nif"
version = "0.1.0"
authors = []
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37.3"
chrono = "0.4"
# Published crates.io pins. For local development against the workspace, an
# uncommitted native/orbis_nif/.cargo/config.toml [patch.crates-io] can redirect
# these to the local paths; CI (no patch) resolves them from crates.io.
# Tracks the astrodynamics bit-exact kernel lane until the next coordinated
# crate release. The lane code requires reported_baseline_m + epoch_count,
# which are NOT in published 0.10.0.
astrodynamics = { git = "https://github.com/neilberkman/astrodynamics", rev = "3bf0186" }
astrodynamics-gnss = { git = "https://github.com/neilberkman/astrodynamics", rev = "3bf0186" }
