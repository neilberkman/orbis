[package]
name = "orbis_nif"
version = "0.1.0"
authors = []
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37.3"
chrono = "0.4"
# Tracks the astrodynamics RTK-kernel lane until the next coordinated crate
# release publishes these APIs. For local development against the workspace, an
# uncommitted native/orbis_nif/.cargo/config.toml can override crates.io pins;
# git-rev dependencies are intentionally explicit here so CI resolves this lane.
astrodynamics = { git = "https://github.com/neilberkman/astrodynamics", rev = "ed1a827ceb326d370baf4deacecad9ee756e635b" }
astrodynamics-gnss = { git = "https://github.com/neilberkman/astrodynamics", rev = "ed1a827ceb326d370baf4deacecad9ee756e635b" }
