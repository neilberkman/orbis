[package]
name = "orbis_nif"
version = "0.1.0"
authors = []
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37.3"
chrono = "0.4"
# Published crates.io pins. For local development against the workspace, an
# uncommitted native/orbis_nif/.cargo/config.toml [patch.crates-io] can redirect
# these to the local paths; CI (no patch) resolves them from crates.io.
astrodynamics = "0.9.0"
astrodynamics-gnss = "0.10.0"
