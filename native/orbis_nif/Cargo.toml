[package]
name = "orbis_nif"
version = "0.1.0"
authors = []
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
rustler = "0.37.3"
chrono = "0.4"
# Published crates.io releases, so CI and external builds resolve without a
# local sibling checkout or a GitHub fetch. For local development against the
# workspace, an uncommitted native/orbis_nif/.cargo/config.toml overrides these
# with the local paths (see config.toml.example).
astrodynamics = "0.9.0"
astrodynamics-gnss = "0.9.0"
